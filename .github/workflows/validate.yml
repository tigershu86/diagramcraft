name: Validate and package skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install locked dependencies
        run: npm ci
      - name: Validate skills and examples
        run: npm test
      - name: Build renderer preview
        run: npm run build
      - name: Build installable skill archives
        run: npm run package:skills
      - name: Upload skill archives
        uses: actions/upload-artifact@v7
        with:
          name: diagramcraft-skills
          path: dist/*.skill
          if-no-files-found: error
